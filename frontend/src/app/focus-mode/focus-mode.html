<div class="focus-container">
  <div class="glass-card timer-card">
    <h2 class="mode-title">{{ isBreak() ? 'Break Time' : 'Deep Focus' }}</h2>
    
    <div class="timer-display" [class.break-mode]="isBreak()">
      {{ formattedTime }}
    </div>

    <div class="timer-controls">
      <button class="btn-control" (click)="toggleTimer()">
        {{ isRunning() ? 'Pause' : 'Start' }}
      </button>
      <button class="btn-control reset" (click)="resetTimer()">Reset</button>
    </div>

    @if (!isBreak() && interruptions() > 0) {
      <div class="interruptions-badge">
        Interruptions: {{ interruptions() }}
      </div>
    }
  </div>
</div>
